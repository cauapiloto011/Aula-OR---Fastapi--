<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cursos</title>
    <style>
        /* Reset básico e tipografia */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container do Formulário */
        .form-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Estilização dos campos */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Botão */
        button {
            width: 100%;
            padding: 14px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Pequena nota de acessibilidade */
        input::placeholder {
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Cadastrar Curso</h1>
        
        <form action="/cursos" method="post">
            <div class="form-group">
                <label for="nome">Nome do Curso</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Desenvolvimento Web" required>
            </div>

            <div class="form-group">
                <label for="carga_horaria">Carga Horária (horas)</label>
                <input type="number" id="carga_horaria" name="carga_horaria" placeholder="Ex: 40" required>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" placeholder="Descreva brevemente o conteúdo do curso..."></textarea>
            </div>

            <button type="submit">Finalizar Cadastro</button>
        </form>
    </div>

</body>
</html>
